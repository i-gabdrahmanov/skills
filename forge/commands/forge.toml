# forge.toml — короткая точка входа в пайплайн feature-pipeline.
#
# Место установки: <project>/.gigacode/commands/forge.toml — рядом с hooks/ и skills/,
# откуда GigaCode-рантайм читает конфиг (settings.json, skills/, commands/). Этот файл
# в репо — источник правды; deploy.sh (шаг 3b) кладёт его в <target>/.gigacode/commands/.
#
# Формат — qwen-code custom command: поле prompt обязательно, {{args}} = хвост после /forge.
description = "Запустить feature-pipeline (forge). Аргумент: ключ Jira (STOR-123) или описание фичи."
prompt = """Запусти скилл feature-pipeline (это forge — end-to-end пайплайн фичи).
Вводные для BRD-фазы (ключ Jira вида STOR-123 ЛИБО свободное описание фичи): {{args}}
Если аргумент пуст — начни с интервью по требованиям."""
